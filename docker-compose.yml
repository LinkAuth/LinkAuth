services:
  linkauth:
    build: .
    ports:
      - "${PORT:-8080}:8080"
    environment:
      # Public URL — Coolify auto-injects SERVICE_FQDN_LINKAUTH
      - LINKAUTH_BASE_URL=${LINKAUTH_BASE_URL:-}
      - SERVICE_FQDN_LINKAUTH=${SERVICE_FQDN_LINKAUTH:-}
      # API key authentication (comma-separated)
      - LINKAUTH_API_KEYS=${LINKAUTH_API_KEYS:-}
      # OAuth providers — add as needed
      - OAUTH_GOOGLE_CLIENT_ID=${OAUTH_GOOGLE_CLIENT_ID:-}
      - OAUTH_GOOGLE_CLIENT_SECRET=${OAUTH_GOOGLE_CLIENT_SECRET:-}
      - OAUTH_GITHUB_CLIENT_ID=${OAUTH_GITHUB_CLIENT_ID:-}
      - OAUTH_GITHUB_CLIENT_SECRET=${OAUTH_GITHUB_CLIENT_SECRET:-}
      - OAUTH_MICROSOFT_CLIENT_ID=${OAUTH_MICROSOFT_CLIENT_ID:-}
      - OAUTH_MICROSOFT_CLIENT_SECRET=${OAUTH_MICROSOFT_CLIENT_SECRET:-}
      # Logging
      - LINKAUTH_LOG_LEVEL=${LINKAUTH_LOG_LEVEL:-INFO}
    volumes:
      - linkauth-data:/app/data
      - linkauth-logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health", "-o", "/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  linkauth-data:
  linkauth-logs:
