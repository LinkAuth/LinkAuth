server:
  host: "0.0.0.0"
  port: 8080
  base_url: "http://localhost:8080"

storage:
  backend: "sqlite"
  sqlite:
    path: "./data/broker.db"

sessions:
  default_ttl: 600          # seconds
  max_ttl: 900
  cleanup_interval: 60      # seconds
  code_length: 8            # e.g. "ABCD-1234"
  poll_interval: 5          # RFC 8628: recommended polling interval in seconds

rate_limit:
  max_sessions_per_minute: 10

# OAuth providers — define connection details once, reused across templates.
# Templates like "google_mail" or "github" reference these by provider ID.
#
# Provider resolution (in order):
#   1. Explicit auth_url + token_url from this file (overrides everything)
#   2. loginpass predefined providers (Google, GitHub, Slack, Discord, Spotify, ...)
#   3. OIDC Discovery via issuer URL (/.well-known/openid-configuration)
#
# Credentials are NEVER stored here — they are loaded from environment variables:
#   OAUTH_{PROVIDER}_CLIENT_ID
#   OAUTH_{PROVIDER}_CLIENT_SECRET
#
# Examples:
#
# oauth_providers:
#   google: {}                             # loginpass knows Google — zero config
#   github: {}                             # loginpass knows GitHub — zero config
#   auth0:                                 # OIDC Discovery via issuer
#     issuer: "https://your-tenant.us.auth0.com"
#   microsoft:                             # override loginpass defaults (e.g. tenant)
#     auth_url: "https://login.microsoftonline.com/{tenant}/oauth2/v2.0/authorize"
#     token_url: "https://login.microsoftonline.com/{tenant}/oauth2/v2.0/token"
#   corp_sso:                              # custom provider, full config
#     auth_url: "https://sso.corp.com/oauth2/authorize"
#     token_url: "https://sso.corp.com/oauth2/token"
#
# For all providers, set credentials in .env (see .env.example):
#   OAUTH_GOOGLE_CLIENT_ID=...
#   OAUTH_GOOGLE_CLIENT_SECRET=...

oauth_providers:
  google: {}
