server:
  host: "0.0.0.0"
  port: 8080
  base_url: "http://localhost:8080"

storage:
  backend: "sqlite"
  sqlite:
    path: "./data/broker.db"

sessions:
  default_ttl: 600          # seconds
  max_ttl: 900
  cleanup_interval: 60      # seconds
  code_length: 8            # e.g. "ABCD-1234"
  poll_interval: 5          # RFC 8628: recommended polling interval in seconds

rate_limit:
  max_sessions_per_minute: 10

# OAuth providers — define connection details once, reused across templates.
# Templates like "google_mail" or "github" reference these by provider ID.
#
# Credentials are NEVER stored here — they are loaded from environment variables
# using the convention:
#
#   OAUTH_{PROVIDER}_CLIENT_ID
#   OAUTH_{PROVIDER}_CLIENT_SECRET
#
# For example, to enable Google OAuth:
#
#   1. Set environment variables (or add to .env):
#      OAUTH_GOOGLE_CLIENT_ID=123...apps.googleusercontent.com
#      OAUTH_GOOGLE_CLIENT_SECRET=GOCSPX-...
#
#   2. Enable the provider here (no config needed for known providers):
#      oauth_providers:
#        google: {}
#
# Known providers (auth_url + token_url auto-discovered via loginpass/OIDC):
#   google, microsoft, github, slack, gitlab, discord, spotify, ...
#
# For known providers, this section is only needed to override defaults.
# For custom/corporate providers, specify auth_url + token_url here:
#
# oauth_providers:
#   google: {}                             # known provider, no config needed
#   github: {}                             # known provider, no config needed
#   microsoft:                             # known provider, override tenant
#     auth_url: "https://login.microsoftonline.com/{tenant}/oauth2/v2.0/authorize"
#     token_url: "https://login.microsoftonline.com/{tenant}/oauth2/v2.0/token"
#   corp_sso:                              # custom provider, full config required
#     auth_url: "https://sso.corp.com/oauth2/authorize"
#     token_url: "https://sso.corp.com/oauth2/token"
#     # Credentials: set OAUTH_CORP_SSO_CLIENT_ID and OAUTH_CORP_SSO_CLIENT_SECRET in .env
