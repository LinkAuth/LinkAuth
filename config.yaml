server:
  host: "0.0.0.0"
  port: 8080
  base_url: "http://localhost:8080"

storage:
  backend: "sqlite"
  sqlite:
    path: "./data/broker.db"

sessions:
  default_ttl: 600          # seconds
  max_ttl: 900
  cleanup_interval: 60      # seconds
  code_length: 8            # e.g. "ABCD-1234"
  poll_interval: 5          # RFC 8628: recommended polling interval in seconds

rate_limit:
  max_sessions_per_minute: 10

# OAuth providers
#
# All OAuth configuration is driven by environment variables (see .env.example).
# No YAML entry is needed to activate a provider — just set the env vars:
#
#   OAUTH_{PROVIDER}_CLIENT_ID       (required)
#   OAUTH_{PROVIDER}_CLIENT_SECRET   (required)
#   OAUTH_{PROVIDER}_ISSUER          (for OIDC Discovery — Auth0, Keycloak, Okta, ...)
#   OAUTH_{PROVIDER}_AUTH_URL        (explicit override)
#   OAUTH_{PROVIDER}_TOKEN_URL       (explicit override)
#
# Known providers (Google, GitHub, Slack, Discord, Spotify, and 16 more via loginpass)
# only need CLIENT_ID + CLIENT_SECRET. URLs are auto-discovered.
#
# You can also mix both: secrets stay in .env, while URLs or issuer are defined here.
# YAML and .env complement each other — env vars always take precedence if both are set.
#
# oauth_providers:
#   microsoft:                             # override tenant-specific URLs
#     auth_url: "https://login.microsoftonline.com/{tenant}/oauth2/v2.0/authorize"
#     token_url: "https://login.microsoftonline.com/{tenant}/oauth2/v2.0/token"
#   corp_sso:                              # custom provider (URLs via YAML, secrets via env)
#     auth_url: "https://sso.corp.com/oauth2/authorize"
#     token_url: "https://sso.corp.com/oauth2/token"
